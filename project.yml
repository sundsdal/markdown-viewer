name: Markdown
options:
  bundleIdPrefix: com.sverresundsdal
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: 0.3.1
  SwiftUIMarkdown:
    url: https://github.com/jaywcjlove/swiftui-markdown
    from: 1.1.0

targets:
  MarkdownViewer:
    type: application
    platform: macOS
    sources:
      - Sources/MarkdownViewer
    dependencies:
      - package: MarkdownUI
      - package: Textual
      - package: SwiftUIMarkdown
        product: Markdown
    settings:
      base:
        PRODUCT_NAME: Markdown
        PRODUCT_MODULE_NAME: MarkdownViewerApp
        PRODUCT_BUNDLE_IDENTIFIER: com.sverresundsdal.markdown
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        MACOSX_DEPLOYMENT_TARGET: "26.0"
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
          DEVELOPMENT_TEAM: AD55H7GUAM
          CODE_SIGN_STYLE: Automatic
    info:
      path: Info.plist
      properties:
        CFBundleName: Markdown
        CFBundleDisplayName: Markdown
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        CFBundleIconFile: AppIcon
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
          - CFBundleTypeName: JSON Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.json
          - CFBundleTypeName: YAML Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.yaml
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown Document
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type: text/markdown
